name: 09 Deploy Production — Backend

on:
  push:
    branches: [main]
    paths:
      - 'BMP-Backend/**'
      - '!BMP-Backend/**/*.md'
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'

jobs:
  # ── Step 1: Validate before touching the server ───────────────────────────
  validate:
    if: github.repository == 'pentasoftwareconsultancy/book-my-parcel'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BMP-Backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BMP-Backend/package-lock.json

      - run: npm ci --omit=dev
      - run: node --check server.js
      - run: npm run lint --if-present || echo "ℹ️ No lint script"

  # ── Step 2: Deploy — requires manual approval via GitHub Environment ───────
  deploy:
    needs: validate
    if: github.repository == 'pentasoftwareconsultancy/book-my-parcel'
    runs-on: ubuntu-latest
    environment: production   # ← pauses for reviewer approval

    steps:
      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            set -e
            export NVM_DIR="/home/bmp/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            bash /var/www/bmp/BMP-Backend/scripts/deploy.sh main

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            HEALTH_URL="${{ secrets.VPS_HEALTH_URL }}"
            if [ -z "$HEALTH_URL" ]; then
              curl -sf http://127.0.0.1:3000/api/health \
                && echo "✅ Local health check passed" \
                || (echo "❌ Health check failed" && exit 1)
            else
              curl -sf "$HEALTH_URL" \
                && echo "✅ Production health check passed" \
                || (echo "❌ Health check failed — rolling back" \
                    && pm2 reload /var/www/bmp/BMP-Backend/ecosystem.config.cjs --env production \
                    && exit 1)
            fi
