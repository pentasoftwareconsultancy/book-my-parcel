# =============================================================================
# Nginx configuration for BMP Backend
# Hostinger VPS — Arch Linux, Mumbai
# Place at: /etc/nginx/sites-available/bmp-backend
# Symlink:  ln -s /etc/nginx/sites-available/bmp-backend /etc/nginx/sites-enabled/
# =============================================================================

# ── Rate limiting zones (defined outside server blocks) ───────────────────────
# General API: 30 requests/second per IP, burst of 50
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
# Auth endpoints: 5 requests/minute per IP (login, OTP, signup)
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;
# Connection limit: max 20 concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream: PM2 workers all listening on port 3000
# Nginx load-balances with least_conn
upstream bmp_backend {
    least_conn;
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;          # ← replace with your actual domain

    # Let's Encrypt ACME challenge (certbot uses this path)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.yourdomain.com;          # ← replace with your actual domain

    # ── SSL (managed by certbot) ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options              "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options       "nosniff"                             always;
    add_header X-XSS-Protection             "1; mode=block"                       always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy           "geolocation=(self), camera=(), microphone=()" always;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size    15m;
    client_body_timeout     30s;
    client_header_timeout   10s;

    # Connection limit per IP
    limit_conn conn_limit 20;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;

    # ── Block sensitive paths ─────────────────────────────────────────────────
    # Prevent direct access to .env, .git, and other sensitive files
    location ~ /\.(env|git|htaccess|gitignore) {
        deny all;
        return 404;
    }

    # SECURITY: Block direct access to KYC documents — they contain sensitive
    # identity documents (Aadhaar, PAN). Serve via authenticated API route only.
    location /uploads/kyc/ {
        deny all;
        return 403;
    }

    # ── Static uploads (non-sensitive) ───────────────────────────────────────
    # Profile photos and parcel images are served directly by Nginx
    location /uploads/profiles/ {
        alias   /var/www/bmp/BMP-Backend/uploads/profiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /uploads/parcels/ {
        alias   /var/www/bmp/BMP-Backend/uploads/parcels/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /uploads/proofs/ {
        alias   /var/www/bmp/BMP-Backend/uploads/proofs/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── WebSocket (Socket.IO) ─────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass          http://bmp_backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Long timeouts for persistent WebSocket connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # ── Auth endpoints — strict rate limiting ─────────────────────────────────
    location ~ ^/api(/v1)?/auth/(login|signup|request-otp|verify-otp|forgot-password) {
        limit_req  zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass          http://bmp_backend;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 10s;
    }

    # ── Health check (no logging, no rate limit) ──────────────────────────────
    location = /api/health {
        proxy_pass http://bmp_backend;
        access_log off;
    }

    # ── General API ───────────────────────────────────────────────────────────
    location / {
        limit_req  zone=api_general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass          http://bmp_backend;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }
}
