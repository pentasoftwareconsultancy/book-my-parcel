name: 03 Deploy Testing — Frontend

on:
  push:
    branches: [testing]
    paths:
      - 'BMP-FE/**'

jobs:
  deploy:
    if: github.repository == 'pentasoftwareconsultancy/book-my-parcel'
    runs-on: ubuntu-latest
    environment: testing
    defaults:
      run:
        working-directory: BMP-FE

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BMP-FE/package-lock.json

      - run: npm ci

      - name: Build (testing)
        env:
          VITE_API_URL:      ${{ secrets.VITE_API_URL_TESTING }}
          VITE_WS_URL:       ${{ secrets.VITE_WS_URL_TESTING }}
          VITE_BASE_URL:     ${{ secrets.VITE_BASE_URL_TESTING }}
          VITE_GEOAPIFY_KEY: ${{ secrets.VITE_GEOAPIFY_KEY }}
        run: npm run build

      - name: Deploy testing frontend to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            set -e
            export NVM_DIR="/home/bmp/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            bash /var/www/bmp/BMP-Backend/scripts/deploy-frontend.sh testing

      - name: Verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            test -f /var/www/bmp/BMP-FE/dist/index.html \
              && echo "✅ Testing frontend deployed" \
              || (echo "❌ Frontend dist missing" && exit 1)
