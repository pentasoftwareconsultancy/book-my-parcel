name: 01 Validate Feature — Frontend

on:
  push:
    branches:
      - 'feature/**'
      - feature/bmp
  pull_request:
    branches: [develop, stage]
    paths:
      - 'BMP-FE/**'

jobs:
  validate:
    if: github.repository == 'pentasoftwareconsultancy/book-my-parcel'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BMP-FE

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BMP-FE/package-lock.json

      - run: npm ci

      - name: Build check
        env:
          VITE_API_URL:      ${{ secrets.VITE_API_URL_TESTING }}
          VITE_WS_URL:       ${{ secrets.VITE_WS_URL_TESTING }}
          VITE_BASE_URL:     ${{ secrets.VITE_BASE_URL_TESTING }}
          VITE_GEOAPIFY_KEY: ${{ secrets.VITE_GEOAPIFY_KEY }}
        run: npm run build

      - name: Lint
        run: npm run lint --if-present || echo "ℹ️ No lint script"
